<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="inner" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
  </defs>
  <!-- Outer glow -->
  <circle cx="32" cy="30" r="28" fill="url(#glow)" opacity="0.3"/>
  <!-- Crystal ball -->
  <circle cx="32" cy="30" r="20" fill="url(#inner)" stroke="#7c3aed" stroke-width="2"/>
  <!-- Shine -->
  <ellipse cx="25" cy="22" rx="6" ry="4" fill="white" opacity="0.4" transform="rotate(-20 25 22)"/>
  <!-- Eye in the ball -->
  <ellipse cx="32" cy="30" rx="10" ry="6" fill="none" stroke="#4c1d95" stroke-width="1.5"/>
  <circle cx="32" cy="30" r="3.5" fill="#4c1d95"/>
  <circle cx="33" cy="29" r="1" fill="#e9d5ff"/>
  <!-- Base/stand -->
  <path d="M22 50 Q27 44 32 46 Q37 44 42 50 Z" fill="#7c3aed"/>
  <ellipse cx="32" cy="50" rx="12" ry="3" fill="#6d28d9"/>
</svg>
